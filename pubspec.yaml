name: linguabot
description: "A LinguaBot Language Learning App"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core & State Management
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # Authentication & Storage
  supabase_flutter: ^2.12.2
  flutter_secure_storage: ^9.0.0

  # AI & Voice
  http: ^1.2.1
  flutter_tts: ^4.0.2
  speech_to_text: ^7.3.0
  record: ^5.0.5
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0
  path_provider: ^2.1.3

  # UI & Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  uuid: ^4.4.0
  flutter_dotenv: ^6.0.0

  # Error Handling & Logging
  logger: ^2.0.0
  firebase_core: ^2.24.0
  firebase_crashlytics: ^3.5.7
  firebase_analytics: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  # Testing
  mocktail: ^1.0.0
  mockito: ^5.4.0
  test: ^1.25.0

# Add this section to resolve the build error
dependency_overrides:
  record_linux: ^1.2.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
