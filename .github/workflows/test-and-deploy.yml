name: Test & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: 3.16.0

jobs:
  # Job 1: Code Quality & Analysis
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests with coverage
        run: |
          flutter test --coverage --verbose

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Check coverage threshold (70%)
        run: |
          COVERAGE=$(grep -oP 'LF:\K[0-9]+' coverage/lcov.info | head -1)
          LH=$(grep -oP 'LH:\K[0-9]+' coverage/lcov.info | head -1)
          if [ -z "$COVERAGE" ] || [ -z "$LH" ]; then
            echo "Could not parse coverage"
            exit 1
          fi
          PERCENT=$((LH * 100 / COVERAGE))
          echo "Code Coverage: ${PERCENT}%"
          if [ $PERCENT -lt 70 ]; then
            echo "❌ Coverage below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage above 70% threshold"

  # Job 3: Widget Tests
  widget-tests:
    name: Widget Tests
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run widget tests
        run: flutter test test/ --verbose

  # Job 4: Build APK for Android
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [ analyze, unit-tests ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/

  # Job 5: Build iOS
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    needs: [ analyze, unit-tests ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --no-codesign --release

      - name: Upload iOS build to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-ios
          path: build/ios/Release-iphoneos/

  # Job 6: Security Scanning
  security:
    name: Security & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Check for vulnerable dependencies
        run: |
          dart pub get
          dart pub global activate dependency_validator
          dependency_validator

      - name: Run security linter
        run: |
          cd Lingua_bot
          flutter pub get
          flutter pub global activate dartanalyzer
          dartanalyzer --fatal-warnings --fatal-infos . || true

  # Job 7: Notification on Completion
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [ analyze, unit-tests, widget-tests, build-android, build-ios, security ]
    if: always()

    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ] || \
             [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.widget-tests.result }}" == "failure" ] || \
             [ "${{ needs.build-android.result }}" == "failure" ] || \
             [ "${{ needs.build-ios.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ]; then
            echo "BUILD_FAILED=true" >> $GITHUB_OUTPUT
          else
            echo "BUILD_FAILED=false" >> $GITHUB_OUTPUT
          fi

      - name: Print Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Analysis**: ${{ needs.analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests**: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Widget Tests**: ${{ needs.widget-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Android Build**: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **iOS Build**: ${{ needs.build-ios.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
